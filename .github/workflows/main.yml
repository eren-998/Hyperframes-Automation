name: Auto Post Instagram Reels

on:
  schedule:
    # 9:00 AM UTC (Lagbhag 2:30 PM Indian Standard Time)
    - cron: '0 9 * * *' 
  workflow_dispatch: # Button dabakar manual run karne ke liye

permissions:
  contents: write # Update ki hui file ko wapas GitHub par save karne ki permission

jobs:
  generate-and-post:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }} # File modify karne ke liye token

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install System Dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Dependencies
        run: npm ci

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Clone Hyperframes
        run: git clone https://github.com/heygen-com/hyperframes.git
        
      - name: Install Hyperframes dependencies
        run: |
          cd hyperframes
          bun install

      - name: Run Automation Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
        run: node scripts/run_pipeline.js

      - name: Save Video to GitHub (Dikhane ke liye)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Generated-Video
          path: hyperframes/renders/*.mp4

      - name: Commit and Push Updated Queue
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add topics.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-removed processed topic from queue" && git push)
